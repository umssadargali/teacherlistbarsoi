<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of All Teachers Barsoi Block</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
            color: #1e293b;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .main-heading {
            text-align: center;
            color: #1e3a8a;
            margin: 0 0 5px 0;
            font-size: 28px;
            font-weight: 700;
        }
        .sub-heading {
            text-align: center;
            color: #64748b;
            margin: 0 0 25px 0;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
        }
        .stat-card h3 {
            margin: 0 0 10px 0;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }
        .stat-card .number {
            font-size: 28px;
            font-weight: 700;
        }
        .stat-card.title-match { background: linear-gradient(135deg, #0f766e, #14b8a6); box-shadow: 0 4px 6px rgba(20, 184, 166, 0.2); }
        .stat-card.school { background: linear-gradient(135deg, #b45309, #f59e0b); box-shadow: 0 4px 6px rgba(245, 158, 11, 0.2); }
        
        .search-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .search-group {
            display: flex;
            flex-direction: column;
        }
        .search-group label {
            font-weight: 600;
            margin-bottom: 6px;
            color: #475569;
            font-size: 13px;
        }
        .search-group input {
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }
        .search-group input:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .table-container {
            overflow-x: auto;
            max-height: 550px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: left;
            white-space: nowrap;
        }
        th {
            background-color: #1e3a8a;
            color: white;
            padding: 14px 12px;
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: 600;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        tr:nth-child(even) {
            background-color: #f8fafc;
        }
        tr:hover {
            background-color: #f1f5f9;
        }
        .status-msg {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #d97706;
            margin: 30px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="main-heading">List of All Teachers Barsoi Block</h1>
    <h3 class="sub-heading">Barsoi, Katihar, Bihar</h3>
    
    <div class="stats-container">
        <div class="stat-card">
            <h3>Total Number of Teachers</h3>
            <div class="number" id="countTeacher">0</div>
        </div>
        <div class="stat-card school">
            <h3>Total Number of Schools</h3>
            <div class="number" id="countSchool">0</div>
        </div>
        <div class="stat-card title-match">
            <h3>Filtered Category Count</h3>
            <div class="number" id="countTitleMatch">0</div>
        </div>
    </div>
    
    <div class="search-box">
        <div class="search-group">
            <label for="searchName">🔍 Search by Teacher Name</label>
            <input type="text" id="searchName" placeholder="Type name..." oninput="filterData()">
        </div>
        <div class="search-group">
            <label for="searchTitle">🔖 Search by Title (TRE-1, TRE-2...)</label>
            <input type="text" id="searchTitle" placeholder="e.g. TRE-1..." oninput="filterData()">
        </div>
        <div class="search-group">
            <label for="searchMobile">📱 Search by Mobile Number</label>
            <input type="text" id="searchMobile" placeholder="Type mobile no..." oninput="filterData()">
        </div>
        <div class="search-group">
            <label for="searchSchool">🏫 Search by School Name</label>
            <input type="text" id="searchSchool" placeholder="Type school name..." oninput="filterData()">
        </div>
    </div>

    <div id="status" class="status-msg">Google Sheet se live data fetch ho raha hai... Kripya pratiksha karein.</div>

    <div class="table-container">
        <table id="teacherTable" style="display: none;">
            <thead>
                <tr>
                    <th>Sl. No</th>
                    <th>Teacher ID</th>
                    <th>Teacher Name</th>
                    <th>Teacher Title</th>
                    <th>Mobile No</th>
                    <th>School Name</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>
</div>

<script>
    // Aapki exact published CSV link maine pehle se yahan set kar di hai
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSlb8ldpY6cIrPZhUv1HddjVnSWaCVSxVnBYuBVNJbajyYh740D36yBFNhASlL9Gy7dwpaumDPrEzeM/pub?output=csv';
    
    let allData = [];

    // Robust CSV Text Parser that handles carriage returns (\r\n) correctly
    function parseCSVData(text) {
        // Line break fix: Split by \r\n or \n
        let lines = text.split(/\r?\n/);
        
        // Row 14 par exact data headers hain (Index 13)
        let headerLine = lines[13]; 
        if (!headerLine) return [];
        
        let headers = headerLine.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h => h.replace(/^"|"$/g, '').trim());
        
        let parsedRows = [];
        for (let i = 14; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            let cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
            
            let rowObj = {};
            headers.forEach((header, index) => {
                rowObj[header] = cols[index] || '';
            });
            
            // Layout alignment according to your exact sheet headers
            let finalSchool = rowObj['School'] || rowObj['School Name'] || '';
            rowObj['CalculatedSchool'] = finalSchool;

            if (rowObj['Teacher Name'] || rowObj['Teacher ID']) {
                parsedRows.push(rowObj);
            }
        }
        return parsedRows;
    }

    async function loadData() {
        try {
            const response = await fetch(csvUrl);
            const dataText = await response.text();
            
            allData = parseCSVData(dataText);
            
            document.getElementById('status').style.display = 'none';
            document.getElementById('teacherTable').style.display = 'table';
            
            renderTable(allData);
            updateStats(allData);
        } catch (error) {
            console.error('CSV Load Error:', error);
            document.getElementById('status').innerText = 'Data load nahi ho saka. Kripya check karein ki aapka internet chal raha hai aur sheet published hai.';
            document.getElementById('status').style.color = '#dc2626';
        }
    }

    function updateStats(data) {
        const uniqueSchools = new Set();
        let titleMatchCount = 0;
        
        const titleQuery = document.getElementById('searchTitle').value.toLowerCase().trim();
        
        data.forEach(row => {
            if (row['CalculatedSchool']) uniqueSchools.add(row['CalculatedSchool'].toString().trim());
            
            if (titleQuery && (row['Teacher Title'] || '').toString().toLowerCase().includes(titleQuery)) {
                titleMatchCount++;
            }
        });

        document.getElementById('countTeacher').innerText = data.length;
        document.getElementById('countSchool').innerText = uniqueSchools.size;
        document.getElementById('countTitleMatch').innerText = titleQuery ? titleMatchCount : data.length;
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; font-weight:bold; padding:20px; color:#64748b;">Koi record nahi mila.</td></tr>';
            return;
        }

        data.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${row['Sl. No'] || ''}</td>
                <td>${row['Teacher ID'] || ''}</td>
                <td><strong>${row['Teacher Name'] || ''}</strong></td>
                <td><span style="background:#e0f2fe; color:#0369a1; padding:2px 8px; border-radius:4px; font-weight:600;">${row['Teacher Title'] || ''}</span></td>
                <td>${row['Mobile No'] || ''}</td>
                <td>${row['CalculatedSchool'] || ''}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function filterData() {
        const nameQuery = document.getElementById('searchName').value.toLowerCase().trim();
        const titleQuery = document.getElementById('searchTitle').value.toLowerCase().trim();
        const mobileQuery = document.getElementById('searchMobile').value.toLowerCase().trim();
        const schoolQuery = document.getElementById('searchSchool').value.toLowerCase().trim();

        const filtered = allData.filter(row => {
            const nameMatch = (row['Teacher Name'] || '').toString().toLowerCase().includes(nameQuery);
            const titleMatch = (row['Teacher Title'] || '').toString().toLowerCase().includes(titleQuery);
            const mobileMatch = (row['Mobile No'] || '').toString().toLowerCase().includes(mobileQuery);
            const schoolMatch = (row['CalculatedSchool'] || '').toString().toLowerCase().includes(schoolQuery);

            return nameMatch && titleMatch && mobileMatch && schoolMatch;
        });

        renderTable(filtered);
        updateStats(filtered);
    }

    window.onload = loadData;
</script>

</body>
</html>
