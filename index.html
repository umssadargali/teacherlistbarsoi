<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of All Teachers Barsoi Block</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            padding: 15px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        /* Top Header Styling style as per screenshot */
        .header-box {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(30, 58, 138, 0.2);
            margin-bottom: 20px;
        }
        .header-box h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .header-box p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Stats Cards Dashboard */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 5px solid #1e3a8a;
        }
        .stat-card.blue-accent {
            border-left-color: #10b981;
        }
        .stat-card h3 {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .stat-card .number {
            font-size: 20px;
            font-weight: 700;
            color: #1e3a8a;
        }

        /* Search Section Box */
        .search-section {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .search-group {
            margin-bottom: 12px;
        }
        .search-group:last-child {
            margin-bottom: 0;
        }
        .search-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 5px;
        }
        .search-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        .search-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .status-msg {
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: #b45309;
            margin: 20px 0;
        }

        /* Card Layout for Teachers List (2nd Screenshot Interface) */
        .teacher-card {
            background: white;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            position: relative;
            overflow: hidden;
        }
        .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px dashed #e2e8f0;
            padding-bottom: 8px;
        }
        .sl-no-tag {
            background: #1e3a8a;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 20px;
        }
        .teacher-title-badge {
            background: #e0f2fe;
            color: #0369a1;
            font-size: 12px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 6px;
        }
        .teacher-name {
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 6px;
        }
        .card-detail {
            font-size: 13px;
            color: #4a5568;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
        }
        .card-detail strong {
            color: #1e293b;
            width: 85px;
            display: inline-block;
        }
        .phone-link {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h1>List of All Teachers</h1>
        <p>Barsoi Block, Katihar, Bihar</p>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Teachers</h3>
            <div class="number" id="countTeacher">0</div>
        </div>
        <div class="stat-card blue-accent">
            <h3>Category Count</h3>
            <div class="number" id="countTitleMatch">0</div>
        </div>
    </div>
    
    <div class="search-section">
        <div class="search-group">
            <label>🔍 SEARCH BY TEACHER NAME</label>
            <input type="text" id="searchName" placeholder="Enter teacher name..." oninput="filterData()">
        </div>
        <div class="search-group">
            <label>🔖 SEARCH BY TITLE (TRE-1, TRE-2, etc.)</label>
            <input type="text" id="searchTitle" placeholder="e.g. TRE-1" oninput="filterData()">
        </div>
        <div class="search-group">
            <label>📱 SEARCH BY MOBILE NUMBER</label>
            <input type="text" id="searchMobile" placeholder="Enter 10 digit mobile no..." oninput="filterData()">
        </div>
    </div>

    <div id="status" class="status-msg">Google Sheet se live data load ho raha hai...</div>

    <div id="cardsContainer"></div>
</div>

<script>
    // Aapki exact published CSV url link
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSlb8ldpY6cIrPZhUv1HddjVnSWaCVSxVnBYuBVNJbajyYh740D36yBFNhASlL9Gy7dwpaumDPrEzeM/pub?output=csv';
    
    let allData = [];

    // Custom split pattern for dynamic text blocks
    function parseCSVData(text) {
        let lines = text.split(/\r?\n/);
        // Row 14 contains exact Column A to F headers (Index 13)
        let headerLine = lines[13]; 
        if (!headerLine) return [];
        
        let headers = headerLine.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h => h.replace(/^"|"$/g, '').trim());
        
        let parsedRows = [];
        for (let i = 14; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            let cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
            
            let rowObj = {};
            headers.forEach((header, index) => {
                rowObj[header] = cols[index] || '';
            });
            
            // Map raw object fallback metrics dynamically
            if (rowObj['Teacher Name'] || rowObj['Teacher ID']) {
                parsedRows.push(rowObj);
            }
        }
        return parsedRows;
    }

    async function loadData() {
        try {
            const response = await fetch(csvUrl);
            const dataText = await response.text();
            
            allData = parseCSVData(dataText);
            
            document.getElementById('status').style.display = 'none';
            renderCards(allData);
            updateStats(allData);
        } catch (error) {
            console.error('Error rendering rows:', error);
            document.getElementById('status').innerText = 'Data load nahi ho saka. Connection check karein.';
            document.getElementById('status').style.color = '#dc2626';
        }
    }

    function updateStats(data) {
        let titleMatchCount = 0;
        const titleQuery = document.getElementById('searchTitle').value.toLowerCase().trim();
        
        data.forEach(row => {
            if (titleQuery && (row['Teacher Title'] || '').toString().toLowerCase().includes(titleQuery)) {
                titleMatchCount++;
            }
        });

        document.getElementById('countTeacher').innerText = data.length;
        document.getElementById('countTitleMatch').innerText = titleQuery ? titleMatchCount : data.length;
    }

    // Modern card block layout creation matching screenshot
    function renderCards(data) {
        const container = document.getElementById('cardsContainer');
        container.innerHTML = '';
        
        if (data.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:30px; color:#666; font-weight:600;">Koi record nahi mila.</div>';
            return;
        }

        data.forEach(row => {
            const card = document.createElement('div');
            card.className = 'teacher-card';
            
            // dynamic assignment names fallback logic
            let schoolName = row['School'] || row['School Name'] || 'N/A';

            card.innerHTML = `
                <div class="card-header-row">
                    <span class="sl-no-tag"># ${row['Sl. No'] || '-'}</span>
                    <span class="teacher-title-badge">${row['Teacher Title'] || 'N/A'}</span>
                </div>
                <div class="teacher-name">${row['Teacher Name'] || 'N/A'}</div>
                <div class="card-detail"><strong>Teacher ID:</strong> ${row['Teacher ID'] || '-'}</div>
                <div class="card-detail"><strong>Mobile No:</strong> <a class="phone-link" href="tel:${row['Mobile No']}">${row['Mobile No'] || '-'}</a></div>
                <div class="card-detail"><strong>School:</strong> ${schoolName}</div>
            `;
            container.appendChild(card);
        });
    }

    function filterData() {
        const nameQuery = document.getElementById('searchName').value.toLowerCase().trim();
        const titleQuery = document.getElementById('searchTitle').value.toLowerCase().trim();
        const mobileQuery = document.getElementById('searchMobile').value.toLowerCase().trim();

        const filtered = allData.filter(row => {
            let schoolName = row['School'] || row['School Name'] || '';
            
            const nameMatch = (row['Teacher Name'] || '').toString().toLowerCase().includes(nameQuery);
            const titleMatch = (row['Teacher Title'] || '').toString().toLowerCase().includes(titleQuery);
            const mobileMatch = (row['Mobile No'] || '').toString().toLowerCase().includes(mobileQuery);

            return nameMatch && titleMatch && mobileMatch;
        });

        renderCards(filtered);
        updateStats(filtered);
    }

    window.onload = loadData;
</script>

</body>
</html>
